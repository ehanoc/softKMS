syntax = "proto3";

package softkms;

// Identity service for managing client identities
service IdentityService {
  // Create a new identity (admin only)
  rpc CreateIdentity(CreateIdentityRequest) returns (CreateIdentityResponse);

  // List all identities (admin only)
  rpc ListIdentities(ListIdentitiesRequest) returns (ListIdentitiesResponse);

  // Get identity details
  rpc GetIdentity(GetIdentityRequest) returns (GetIdentityResponse);

  // Revoke an identity (admin only)
  rpc RevokeIdentity(RevokeIdentityRequest) returns (RevokeIdentityResponse);
}

// Key service for managing cryptographic keys
service KeyStore {
  // Initialize the daemon with a passphrase
  rpc Init(InitRequest) returns (InitResponse);

  // Generate a new key
  rpc CreateKey(CreateKeyRequest) returns (CreateKeyResponse);

  // List all keys
  rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);

  // Get key information
  rpc GetKey(GetKeyRequest) returns (GetKeyResponse);

  // Delete a key
  rpc DeleteKey(DeleteKeyRequest) returns (DeleteKeyResponse);

  // Sign data with a key
  rpc Sign(SignRequest) returns (SignResponse);

  // Verify a signature
  rpc Verify(VerifyRequest) returns (VerifyResponse);

  // Import a seed for HD wallet
  rpc ImportSeed(ImportSeedRequest) returns (ImportSeedResponse);

  // Derive a key from seed
  rpc DeriveKey(DeriveKeyRequest) returns (DeriveKeyResponse);

  // Derive a P-256 key deterministically (for WebAuthn/Passkey)
  rpc DeriveP256(DeriveP256Request) returns (DeriveP256Response);

  // Derive an Ed25519 key from seed (BIP32/BIP44)
  rpc DeriveEd25519(DeriveEd25519Request) returns (DeriveEd25519Response);

  // Import an xpub for watch-only derivation
  rpc ImportXpub(ImportXpubRequest) returns (ImportXpubResponse);

  // Derive public key from xpub (no private key needed)
  rpc DerivePublic(DerivePublicRequest) returns (DerivePublicResponse);

  // Change keystore passphrase
  rpc ChangePassphrase(ChangePassphraseRequest) returns (ChangePassphraseResponse);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);
}

// Key algorithm types
enum Algorithm {
  ALGORITHM_UNSPECIFIED = 0;
  ALGORITHM_ED25519 = 1;
  ALGORITHM_ECDSA_SECP256K1 = 2;
  ALGORITHM_ECDSA_SECP256R1 = 3;
  ALGORITHM_RSA = 4;
  ALGORITHM_FALCON_512 = 5;
  ALGORITHM_FALCON_1024 = 6;
}

// Key types
enum KeyType {
  KEY_TYPE_UNSPECIFIED = 0;
  KEY_TYPE_SEED = 1;
  KEY_TYPE_DERIVED = 2;
  KEY_TYPE_IMPORTED = 3;
  KEY_TYPE_EXTENDED_PUBLIC = 4;  // xpub for watch-only derivation
}

// Derivation scheme for HD wallets
enum DerivationScheme {
  DERIVATION_SCHEME_UNSPECIFIED = 0;
  DERIVATION_SCHEME_PEIKERT = 1;  // Enhanced entropy (default)
  DERIVATION_SCHEME_V2 = 2;       // Original IEEE standard
}

// Create key request
message CreateKeyRequest {
  string algorithm = 1;
  optional string label = 2;
  map<string, string> attributes = 3;
  string passphrase = 4;  // Keystore passphrase for wrapping (admin auth)
  string auth_token = 5;  // Identity token for client auth (alternative to passphrase)
}

// Create key response
message CreateKeyResponse {
  string key_id = 1;
  string algorithm = 2;
  string public_key = 3;  // base64 encoded
  string created_at = 4;
  string label = 5;
}

// List keys request
message ListKeysRequest {
  bool include_public_keys = 1;
  string auth_token = 2;  // Identity token for client auth
}

// Key info
message KeyInfo {
  string key_id = 1;
  string algorithm = 2;
  string key_type = 3;
  string created_at = 4;
  optional string label = 5;
  map<string, string> attributes = 6;
  optional string public_key = 7;  // base64 encoded
}

// List keys response
message ListKeysResponse {
  repeated KeyInfo keys = 1;
}

// Get key request
message GetKeyRequest {
  string key_id = 1;
  bool include_public_key = 2;
  string auth_token = 3;  // Identity token for client auth
}

// Get key response
message GetKeyResponse {
  KeyInfo key = 1;
}

// Delete key request
message DeleteKeyRequest {
  string key_id = 1;
  bool force = 2;
  string auth_token = 3;  // Identity token for client auth
}

// Delete key response
message DeleteKeyResponse {
  bool success = 1;
}

// Sign request
message SignRequest {
  string key_id = 1;
  bytes data = 2;  // raw bytes to sign
  string passphrase = 3;  // Keystore passphrase for unwrapping (admin auth)
  string auth_token = 4;  // Identity token for client auth (alternative to passphrase)
}

// Sign response
message SignResponse {
  bytes signature = 1;
  string algorithm = 2;
}

// Verify request
message VerifyRequest {
  string key_id = 1;
  bytes data = 2;       // raw bytes that were signed
  bytes signature = 3;  // signature to verify
}

// Verify response
message VerifyResponse {
  bool valid = 1;       // true if signature is valid
  string algorithm = 2; // algorithm used for verification
}

// Import seed request
message ImportSeedRequest {
  string mnemonic = 1;
  optional string label = 2;
  string passphrase = 3;  // Keystore passphrase for wrapping (admin) or identity token
  string auth_token = 4;  // Identity token for identity-scoped seeds
}

// Import seed response
message ImportSeedResponse {
  string seed_id = 1;
  string created_at = 2;
}

// Derive key request
message DeriveKeyRequest {
  string seed_id = 1;
  string path = 2;  // e.g., "m/44'/283'/0'/0/0"
  optional string label = 3;
}

// Derive key response
message DeriveKeyResponse {
  string key_id = 1;
  string public_key = 2;  // base64 encoded
  string derived_at = 3;
}

// Derive P-256 key request (deterministic derivation for WebAuthn)
message DeriveP256Request {
  string seed_id = 1;
  string origin = 2;        // Domain/origin (e.g., "github.com")
  string user_handle = 3;   // User identifier
  uint32 counter = 4;       // Counter for multiple keys per origin
  optional string label = 5;
  string passphrase = 6;    // For accessing seed
  string auth_token = 7;    // Identity token for identity-scoped derivation
}

// Derive P-256 key response
message DeriveP256Response {
  string key_id = 1;
  string public_key = 2;    // base64 encoded uncompressed P-256 public key
  string algorithm = 3;     // "p256"
  string created_at = 4;
}

// Derive Ed25519 key request (BIP32/BIP44)
message DeriveEd25519Request {
  string seed_id = 1;
  string derivation_path = 2;  // BIP44 path: "m/44'/283'/0'/0/0"
  uint32 coin_type = 3;          // BIP44 coin type (e.g., 283 for Algorand)
  DerivationScheme scheme = 4; // PEIKERT (default) or V2
  bool store_key = 5;            // If true, persist the derived key
  optional string label = 6;
  string passphrase = 7;         // For accessing seed
  string auth_token = 8;         // Identity token for identity-scoped derivation
}

// Derive Ed25519 key response
message DeriveEd25519Response {
  string key_id = 1;
  string public_key = 2;     // base64 encoded Ed25519 public key
  string address = 3;        // Bech32 encoded address (if hrp available)
  string algorithm = 4;      // "ed25519"
  string created_at = 5;
}

// Import xpub request
message ImportXpubRequest {
  bytes xpub = 1;              // 64-byte xpub (public key + chain code)
  uint32 coin_type = 2;
  uint32 account = 3;
  optional string label = 4;
  string passphrase = 5;     // For wrapping xpub
}

// Import xpub response
message ImportXpubResponse {
  string xpub_id = 1;
  string created_at = 2;
}

// Derive public key request (from xpub)
message DerivePublicRequest {
  string xpub_id = 1;
  uint32 index = 2;
  DerivationScheme scheme = 3; // PEIKERT or V2
  optional string hrp = 4;     // Human-readable prefix for bech32 address
}

// Derive public key response
message DerivePublicResponse {
  string key_id = 1;
  string public_key = 2;     // base64 encoded public key
  string address = 3;        // Bech32 encoded address
  string path = 4;           // Derivation path used
}

// Initialize request
message InitRequest {
  string passphrase = 1;  // Initial passphrase for keystore
  bool confirm = 2;       // If true, requires passphrase confirmation
}

// Initialize response
message InitResponse {
  bool success = 1;
  string message = 2;
}

// Change passphrase request
message ChangePassphraseRequest {
  string old_passphrase = 1;
  string new_passphrase = 2;
  bool confirm = 3;  // If true, requires new passphrase confirmation
}

// Change passphrase response
message ChangePassphraseResponse {
  bool success = 1;
  int32 keys_updated = 2;  // Number of keys re-encrypted
  string message = 3;
}

// Identity client types
enum ClientType {
  CLIENT_TYPE_UNSPECIFIED = 0;
  CLIENT_TYPE_AI_AGENT = 1;
  CLIENT_TYPE_SERVICE = 2;
  CLIENT_TYPE_USER = 3;
  CLIENT_TYPE_PKCS11 = 4;
}

// Identity key types
enum IdentityKeyType {
  IDENTITY_KEY_TYPE_UNSPECIFIED = 0;
  IDENTITY_KEY_TYPE_ED25519 = 1;
  IDENTITY_KEY_TYPE_P256 = 2;
}

// Create identity request
message CreateIdentityRequest {
  string passphrase = 1;           // Admin passphrase
  ClientType client_type = 2;
  IdentityKeyType key_type = 3;
  optional string description = 4;
}

// Create identity response
message CreateIdentityResponse {
  string token = 1;                // Bearer token (SHOW ONCE!)
  string public_key = 2;           // "ed25519:..." or "p256:..."
  string created_at = 3;
}

// List identities request
message ListIdentitiesRequest {
  string passphrase = 1;
  bool include_inactive = 2;
}

// Identity info
message IdentityInfo {
  string public_key = 1;
  IdentityKeyType key_type = 2;
  ClientType client_type = 3;
  string description = 4;
  string created_at = 5;
  string last_used = 6;
  bool is_active = 7;
  uint32 key_count = 8;
}

// List identities response
message ListIdentitiesResponse {
  repeated IdentityInfo identities = 1;
}

// Get identity request
message GetIdentityRequest {
  string token = 1;                // Token of requesting identity
  string public_key = 2;           // Target identity (optional, admin can query any)
}

// Get identity response
message GetIdentityResponse {
  IdentityInfo identity = 1;
}

// Revoke identity request
message RevokeIdentityRequest {
  string passphrase = 1;
  string public_key = 2;
  bool force = 3;
}

// Revoke identity response
message RevokeIdentityResponse {
  bool success = 1;
  string message = 2;
}

// Health request
message HealthRequest {}

// Health response
message HealthResponse {
  bool healthy = 1;
  string version = 2;
  bool storage_ready = 3;
  bool api_ready = 4;
  bool initialized = 5;  // True if passphrase has been set
}
